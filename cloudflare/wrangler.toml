# Cloudflare Pages config
# Deploy: wrangler pages deploy . --project-name your-pages

name = "your-pages"
pages_build_output_dir = "."
compatibility_date = "2024-01-01"

# TODO: Create KV namespace and replace with your ID
# wrangler kv namespace create PAGE_VIEWS
[[kv_namespaces]]
binding = "PAGE_VIEWS"
id = "YOUR_KV_NAMESPACE_ID"
